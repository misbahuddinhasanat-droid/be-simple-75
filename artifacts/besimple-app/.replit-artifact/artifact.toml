kind = "mobile"
previewPath = "/besimple-app/"
title = "Be Simple 75 — Mobile"
version = "1.0.0"
id = "artifacts/besimple-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/besimple-app/" ]
localPort = 23936

[services.development]
run = "pnpm --filter @workspace/besimple-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/besimple-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/besimple-app", "run", "serve" ]

[services.env]
PORT = "23936"
BASE_PATH = "/besimple-app/"
