kind = "web"
previewPath = "/"
title = "Custom T-Shirt Studio"
version = "1.0.0"
id = "artifacts/tshirt-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18280

[services.development]
run = "pnpm --filter @workspace/tshirt-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tshirt-studio", "run", "build" ]
publicDir = "artifacts/tshirt-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18280"
BASE_PATH = "/"
